apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubebot
  labels:
    app: kubebot
    name: kubebot
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kubebot
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: kubebot
    spec:
      containers:
        - name: kubebot
          image: kubebot:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: kubebot-config
            - secretRef:
                name: kubebot-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
